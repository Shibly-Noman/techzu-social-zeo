services:
  api:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/mini-social-feed
      JWT_SECRET: ${JWT_SECRET:-compose-dev-secret-change-me-1234}
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:-}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongo:
    image: mongo:7
    # Not published to the host — reachable only from the api service.
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mongo-data:
