name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mongo:
        image: mongo:7
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Boot API and run smoke suite
        env:
          PORT: 4000
          MONGODB_URI: mongodb://localhost:27017/mini-social-feed-ci
          JWT_SECRET: ci-only-secret-not-used-in-prod-0000000000
        run: |
          node dist/index.js &
          timeout 30 bash -c 'until curl -sf http://localhost:4000/health; do sleep 1; done'
          npm run smoke
      - name: Sanity-build the Docker image Render will use
        run: docker build -f Dockerfile -t backend-ci .

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"